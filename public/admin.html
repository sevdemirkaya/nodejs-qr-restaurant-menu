<!DOCTYPE html>
<html>
<head>
<title>Mutfak Paneli</title>
<style>
body{
    font-family: sans-serif;
    background:#111;
    color:white;
    padding:30px;
}

.order{
    background:#222;
    padding:15px;
    margin:15px 0;
    border-radius:10px;
}

button{
    background:red;
    border:none;
    padding:8px 12px;
    color:white;
    border-radius:6px;
    cursor:pointer;
}
</style>
</head>
<body>

<h1>🍳 Mutfak Ekranı</h1>

<div id="orders"></div>

<script>
function loadOrders(){
    fetch('/orders')
    .then(res => res.json())
    .then(data => {

        const container = document.getElementById('orders');
        container.innerHTML = "";

        data.forEach((order,index)=>{

            const div = document.createElement('div');
            div.className = "order";

            let items = order.items
                .map(item => `${item.name} (${item.price} TL)`)
                .join("<br>");

            div.innerHTML = `
                <h3>Masa ${order.table} - Sipariş #${index+1}</h3>
                <p>${items}</p>
                <button onclick="deleteOrder(${index})">
                    Hazırlandı ✅
                </button>
            `;

            container.appendChild(div);
        });

    });
}

function deleteOrder(index){
    fetch('/delete/' + index, {
        method: 'DELETE'
    })
    .then(() => loadOrders());
}

loadOrders();
setInterval(loadOrders, 3000);
</script>

</body>
</html>
