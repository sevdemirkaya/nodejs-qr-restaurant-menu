<!DOCTYPE html>
<html>
<head>
<title>Mutfak Paneli</title>

<style>

body{
    font-family: sans-serif;
    background:#111;
    color:white;
    padding:30px;
}

h1{
    margin-bottom:30px;
}

.order{
    background:#222;
    padding:20px;
    margin:20px 0;
    border-radius:12px;
    border-left:6px solid orange;
}

.order h3{
    margin:0 0 10px 0;
}

.items{
    margin-bottom:10px;
}

.status{
    font-weight:bold;
    margin-bottom:10px;
}

button{
    border:none;
    padding:8px 14px;
    margin-right:5px;
    border-radius:6px;
    cursor:pointer;
    font-weight:bold;
}

.start{
    background:orange;
    color:black;
}

.ready{
    background:green;
    color:white;
}

.delete{
    background:red;
    color:white;
}

</style>

</head>

<body>

<h1>🍳 Mutfak Ekranı</h1>

<div id="orders"></div>

<script>

function loadOrders(){

fetch('/orders')
.then(res => res.json())
.then(data => {

const container = document.getElementById('orders');
container.innerHTML="";

data.forEach((order,index)=>{

const div=document.createElement('div');
div.className="order";

let items = order.items
.map(item => `${item.name} (${item.price} TL)`)
.join("<br>");

let status = order.status || "new";

let statusText="🟡 Yeni Sipariş";

if(status==="preparing") statusText="🟠 Hazırlanıyor";
if(status==="ready") statusText="🟢 Hazır";

div.innerHTML=`

<h3>Masa ${order.table} - Sipariş #${index+1}</h3>

<div class="items">${items}</div>

<div class="status">${statusText}</div>

<button class="start" onclick="updateStatus(${order.id},'preparing')">
Hazırlamaya Başla
</button>

<button class="ready" onclick="updateStatus(${order.id},'ready')">
Hazır
</button>

<button class="delete" onclick="deleteOrder(${order.id})">
Sil
</button>

`;

container.appendChild(div);

});

}) ;

}

function updateStatus(index,status){

fetch('/status/'+index,{
method:'POST',
headers:{'Content-Type':'application/json'},
body:JSON.stringify({status})
})
.then(()=>loadOrders());

}

function deleteOrder(index){

fetch('/delete/'+index,{
method:'DELETE'
})
.then(()=>loadOrders());

}

loadOrders();
setInterval(loadOrders,3000);

</script>

</body>
</html>
